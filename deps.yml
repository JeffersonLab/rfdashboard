  keycloak:
    image: jeffersonlab/keycloak:3.0.0
    hostname: keycloak
    container_name: keycloak
    ports:
      - "8081:8080"
      - "9991:9990"
    environment:
      KC_FRONTEND_URL: 'http://localhost:8081/auth'
      KC_BACKEND_URL: 'http://localhost:8080/auth'
      KC_HTTP_RELATIVE_PATH: '/auth'
      KC_BOOTSTRAP_ADMIN_USERNAME: 'admin'
      KC_BOOTSTRAP_ADMIN_PASSWORD: 'admin'
      KC_CLIENT_NAME: 'rfdashboard'
      KC_RESOURCE: 'rfdashboard'
      KC_REDIRECT_URIS: '["https://localhost:8443/*"]'

  puppet:
    image: slominskir/puppet-show:2.1.1
    hostname: puppet
    container_name: puppet
    ports:
      - "3000:3000"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    hostname: mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"